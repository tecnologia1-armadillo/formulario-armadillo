<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registro de Personal – Armadillo</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />

    <!-- jQuery and Select2 CDN -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>

    <style>
        :root {
            --yellow: #FFDE00;
            --dark: #121212;
            --card: #1e1e1e;
            --border: #2e2e2e;
            --text: #e8e8e8;
            --muted: #888;
            --input-bg: #2a2a2a;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Nunito', sans-serif;
            background: var(--dark);
            color: var(--text);
            min-height: 100vh;
            padding: 2rem 1rem 4rem;
        }

        /* ── Header ── */
        .header {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: .75rem;
            margin-bottom: 2.5rem;
        }

        .header img {
            height: 72px;
        }

        .header h1 {
            font-size: 1.5rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--yellow);
        }

        .header p {
            color: var(--muted);
            font-size: .875rem;
        }

        /* ── Card ── */
        .card {
            max-width: 820px;
            margin: 0 auto;
            background: var(--card);
            border: 1px solid var(--border);
            border-top: 3px solid var(--yellow);
            border-radius: 10px;
            padding: 2rem;
        }

        /* ── Section title ── */
        .section-title {
            font-size: .7rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--yellow);
            border-bottom: 1px solid var(--border);
            padding-bottom: .5rem;
            margin: 2rem 0 1.25rem;
        }

        .section-title:first-of-type {
            margin-top: 0;
        }

        /* ── Grid ── */
        .grid {
            display: grid;
            gap: 1rem;
        }

        .grid-2 {
            grid-template-columns: 1fr 1fr;
        }

        .grid-3 {
            grid-template-columns: 1fr 1fr 1fr;
        }

        @media (max-width: 600px) {

            .grid-2,
            .grid-3 {
                grid-template-columns: 1fr;
            }
        }

        /* ── Field ── */
        .field {
            display: flex;
            flex-direction: column;
            gap: .35rem;
        }

        .field label {
            font-size: .8rem;
            font-weight: 700;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: .5px;
        }

        .field label .req {
            color: var(--yellow);
            margin-left: 2px;
        }

        .field input,
        .field select {
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            font-family: 'Nunito', sans-serif;
            font-size: .9rem;
            padding: .55rem .8rem;
            transition: border-color .2s;
            width: 100%;
        }

        .field input:focus,
        .field select:focus {
            outline: none;
            border-color: var(--yellow);
            box-shadow: 0 0 0 3px rgba(255, 222, 0, .12);
        }

        .field input[type="file"] {
            padding: .45rem .6rem;
            cursor: pointer;
            color: var(--muted);
        }

        .field select option {
            background: #1e1e1e;
        }

        /* ── Submit ── */
        .btn-submit {
            margin-top: 2rem;
            width: 100%;
            padding: .85rem;
            background: var(--yellow);
            color: #000;
            font-family: 'Nunito', sans-serif;
            font-size: 1rem;
            font-weight: 800;
            letter-spacing: 1px;
            text-transform: uppercase;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background .2s, transform .1s;
        }

        .btn-submit:hover:not(:disabled) {
            background: #e6c800;
            transform: translateY(-1px);
        }

        .btn-submit:disabled {
            opacity: .5;
            cursor: not-allowed;
        }

        /* ── Nota ── */
        .nota {
            text-align: center;
            font-size: .78rem;
            color: var(--muted);
            margin-top: 1.25rem;
        }

        /* autofill dark fix */
        input:-webkit-autofill,
        input:-webkit-autofill:focus {
            -webkit-box-shadow: 0 0 0 30px #2a2a2a inset !important;
            -webkit-text-fill-color: #e8e8e8 !important;
        }

        /* ── Estilos Select2 Oscuro Robustos ── */
        html body .select2-container {
            width: 100% !important;
        }

        html body .select2-container--default .select2-selection--single {
            background-color: var(--input-bg) !important;
            border: 1px solid var(--border) !important;
            border-radius: 6px !important;
            height: auto !important;
            padding: .4rem .5rem !important;
            transition: border-color .2s;
        }

        html body .select2-container--default .select2-selection--single .select2-selection__rendered {
            color: var(--text) !important;
            font-family: 'Nunito', sans-serif !important;
            font-size: .9rem !important;
            padding-left: 0 !important;
            line-height: normal !important;
        }

        html body .select2-container--default .select2-selection--single .select2-selection__arrow {
            height: 100% !important;
            right: 8px !important;
        }

        html body .select2-container--default .select2-selection--single .select2-selection__arrow b {
            border-color: var(--muted) transparent transparent transparent !important;
        }

        html body .select2-container--default.select2-container--open .select2-selection--single .select2-selection__arrow b {
            border-color: transparent transparent var(--muted) transparent !important;
        }

        html body .select2-container--default.select2-container--focus .select2-selection--single {
            border-color: var(--yellow) !important;
            box-shadow: 0 0 0 3px rgba(255, 222, 0, .12) !important;
        }

        /* Dropdown Flotante */
        html body .select2-dropdown {
            background-color: var(--card) !important;
            border: 1px solid var(--border) !important;
            border-radius: 6px !important;
            z-index: 9999 !important;
        }

        html body .select2-search--dropdown {
            padding: 8px !important;
            background-color: var(--card) !important;
        }

        html body .select2-search--dropdown .select2-search__field {
            background-color: var(--input-bg) !important;
            border: 1px solid var(--border) !important;
            color: var(--text) !important;
            font-family: 'Nunito', sans-serif !important;
            border-radius: 4px !important;
            padding: 6px 10px !important;
            width: 100% !important;
        }

        html body .select2-search--dropdown .select2-search__field:focus {
            outline: none !important;
            border-color: var(--yellow) !important;
        }

        html body .select2-container--default .select2-results {
            background-color: var(--card) !important;
        }

        html body .select2-container--default .select2-results__options {
            background-color: var(--card) !important;
        }

        html body .select2-container--default .select2-results__option {
            color: var(--text) !important;
            font-family: 'Nunito', sans-serif !important;
            font-size: .9rem !important;
            padding: 8px 12px !important;
            background-color: var(--card) !important;
        }

        /* Hover / Resaltado */
        html body .select2-container--default .select2-results__option--highlighted[aria-selected] {
            background-color: var(--yellow) !important;
            color: #121212 !important;
        }

        /* Seleccionado */
        html body .select2-container--default .select2-results__option[aria-selected="true"] {
            background-color: rgba(255, 222, 0, 0.15) !important;
            color: var(--yellow) !important;
        }
    </style>
</head>

<body>

    <div class="header">
        <img src="https://raw.githubusercontent.com/tecnologia2-armadillo/erp-frontend/main/public/logo.png"
            alt="Armadillo" onerror="this.style.display='none'">
        <h1>Registro de Personal</h1>
        <p>Solo pueden enviar el formulario los usuarios autorizados</p>
    </div>

    <div class="card">
        <form id="personalForm">

            <!-- ── Documentos ── -->
            <div class="section-title">Documentos</div>
            <div class="grid grid-2">
                <div class="field">
                    <label>Foto personal<span class="req">*</span></label>
                    <input type="file" name="per_foto" accept="image/*" required>
                </div>
                <div class="field">
                    <label>Imagen / Cédula<span class="req">*</span></label>
                    <input type="file" name="per_pdf_cedula" accept="application/pdf,image/*" required>
                </div>
                <div class="field">
                    <label>Certificado bancario<span class="req">*</span></label>
                    <input type="file" name="per_pdf_comprobante_banco" accept="application/pdf,image/*" required>
                </div>
                <div class="field">
                    <label>RUT <span style="color:var(--muted)">(opcional)</span></label>
                    <input type="file" name="per_pdf_rut" accept="application/pdf,image/*">
                </div>
                <div class="field">
                    <label>Hoja de vida <span style="color:var(--muted)">(opcional)</span></label>
                    <input type="file" name="per_pdf_hoja_vida" accept="application/pdf,image/*">
                </div>
            </div>

            <!-- ── Identificación ── -->
            <div class="section-title">Identificación</div>
            <div class="grid grid-2">
                <div class="field">
                    <label>Tipo de documento<span class="req">*</span></label>
                    <select name="tipo_documento" required>
                        <option value="">— Seleccione —</option>
                        <option value="CC">CC – Cédula de Ciudadanía</option>
                        <option value="PPT">PPT – Permiso por Protección Temporal</option>
                    </select>
                </div>
                <div class="field">
                    <label>Número de documento<span class="req">*</span></label>
                    <input type="text" name="num_documento" maxlength="10" inputmode="numeric" pattern="\d{6,10}"
                        class="digits-only" required>
                </div>
            </div>

            <!-- ── Datos personales ── -->
            <div class="section-title">Datos personales</div>
            <div class="grid grid-2">
                <div class="field">
                    <label>Primer nombre<span class="req">*</span></label>
                    <input type="text" name="primer_nombre" maxlength="50" class="solo_letras" required>
                </div>
                <div class="field">
                    <label>Segundo nombre <span style="color:var(--muted)">(opcional)</span></label>
                    <input type="text" name="segundo_nombre" maxlength="50" class="solo_letras">
                </div>
                <div class="field">
                    <label>Primer apellido<span class="req">*</span></label>
                    <input type="text" name="primer_apellido" maxlength="50" class="solo_letras" required>
                </div>
                <div class="field">
                    <label>Segundo apellido <span style="color:var(--muted)">(opcional)</span></label>
                    <input type="text" name="segundo_apellido" maxlength="50" class="solo_letras">
                </div>
                <div class="field">
                    <label>Género<span class="req">*</span></label>
                    <select name="generos_id" id="generoSelect" required></select>
                </div>
                <div class="field">
                    <label>Fecha de nacimiento<span class="req">*</span></label>
                    <input type="date" name="fecha_nacimiento" required>
                </div>
                <div class="field">
                    <label>Correo electrónico<span class="req">*</span></label>
                    <input type="email" name="correo" maxlength="100" required>
                </div>
                <div class="field">
                    <label>EPS <span style="color:var(--muted)">(opcional)</span></label>
                    <select name="eps_id" id="epsSelect"></select>
                </div>
            </div>

            <!-- ── Contacto ── -->
            <div class="section-title">Contacto</div>
            <div class="grid grid-2">
                <div class="field">
                    <label>WhatsApp<span class="req">*</span></label>
                    <input type="text" name="telefono_whatsapp" maxlength="10" class="digits-only" required>
                </div>
                <div class="field">
                    <label>Teléfono llamada <span style="color:var(--muted)">(opcional)</span></label>
                    <input type="text" name="telefono_llamada" maxlength="10" class="digits-only">
                </div>
                <div class="field">
                    <label>Contacto emergencia<span class="req">*</span></label>
                    <input type="text" name="nombre_emergencia" maxlength="100" class="solo_letras" required>
                </div>
                <div class="field">
                    <label>Teléfono emergencia<span class="req">*</span></label>
                    <input type="text" name="telefono_contacto_emergencia" maxlength="10" class="digits-only" required>
                </div>
            </div>

            <!-- ── Residencia ── -->
            <div class="section-title">Residencia</div>
            <div class="grid grid-2">
                <div class="field">
                    <label>Dirección<span class="req">*</span></label>
                    <input type="text" name="direccion_residencia" maxlength="100" required>
                </div>
                <div class="field">
                    <label>Ciudad<span class="req">*</span></label>
                    <select name="municipios_id" id="ciudadSelect" required></select>
                </div>
                <div class="field">
                    <label>Localidad / Barrio<span class="req">*</span></label>
                    <input type="text" name="localidad_barrio" maxlength="100" class="solo_letras" required>
                </div>
            </div>

            <!-- ── Tallas & Salud ── -->
            <div class="section-title">Tallas &amp; Salud</div>
            <div class="grid grid-3">
                <div class="field">
                    <label>Estatura (cm)<span class="req">*</span></label>
                    <input type="text" name="estatura" maxlength="3" class="digits-only" required>
                </div>
                <div class="field">
                    <label>Talla camiseta<span class="req">*</span></label>
                    <select name="talla_camiseta" required>
                        <option value="">— Seleccione —</option>
                        <option>XS</option>
                        <option>S</option>
                        <option>M</option>
                        <option>L</option>
                        <option>XL</option>
                        <option>2XL</option>
                        <option>3XL</option>
                        <option>4XL</option>
                    </select>
                </div>
                <div class="field">
                    <label>Talla pantalón <span style="color:var(--muted)">(opcional)</span></label>
                    <select name="talla_pantalon">
                        <option value="">00</option>
                        <option>04</option>
                        <option>06</option>
                        <option>08</option>
                        <option>10</option>
                        <option>12</option>
                        <option>14</option>
                        <option>16</option>
                        <option>18</option>
                        <option>20</option>
                        <option>22</option>
                        <option>24</option>
                        <option>26</option>
                        <option>28</option>
                        <option>30</option>
                        <option>32</option>
                        <option>34</option>
                        <option>36</option>
                        <option>38</option>
                        <option>40</option>
                    </select>
                </div>
                <div class="field">
                    <label>Talla zapatos <span style="color:var(--muted)">(opcional)</span></label>
                    <select name="talla_zapatos">
                        <option value="">00</option>
                        <option>30</option>
                        <option>31</option>
                        <option>32</option>
                        <option>33</option>
                        <option>34</option>
                        <option>35</option>
                        <option>36</option>
                        <option>37</option>
                        <option>38</option>
                        <option>39</option>
                        <option>40</option>
                        <option>41</option>
                        <option>42</option>
                        <option>43</option>
                        <option>44</option>
                        <option>45</option>
                    </select>
                </div>
                <div class="field">
                    <label>Tipo de alimentación<span class="req">*</span></label>
                    <select name="alimentacion_id" id="alimentacionSelect" required></select>
                </div>
                <div class="field">
                    <label>Alergias <span style="color:var(--muted)">(opcional)</span></label>
                    <input type="text" name="alergias" maxlength="100" class="solo_letras">
                </div>
            </div>

            <!-- ── Otros ── -->
            <div class="section-title">Otros</div>
            <div class="grid grid-2">
                <div class="field">
                    <label>Nivel de inglés</label>
                    <select name="nivel_ingles">
                        <option value="NO HABLO INGLES">No hablo inglés</option>
                        <option value="A1">A1</option>
                        <option value="A2">A2</option>
                        <option value="B1">B1</option>
                        <option value="B2">B2</option>
                        <option value="C1">C1</option>
                        <option value="C2">C2</option>
                    </select>
                </div>
            </div>

            <!-- ── Datos bancarios ── -->
            <div class="section-title">Datos bancarios</div>
            <div class="grid grid-2">
                <div class="field">
                    <label>Banco<span class="req">*</span></label>
                    <select name="dba_banco_id" id="BancoSelect" required></select>
                </div>
                <div class="field">
                    <label>Número de cuenta<span class="req">*</span></label>
                    <input type="text" name="dba_num_cuenta" maxlength="20" class="digits-only" required>
                </div>
            </div>

            <button type="submit" class="btn-submit">Registrar</button>
            <p class="nota">Solo usuarios autorizados pueden completar este formulario.</p>

        </form>
    </div>

    <script>
        const API_BASE = window.location.origin.includes('localhost') || window.location.origin.includes('127.0.0.1')
            ? 'http://localhost:8001/api/v1'
            : 'https://backend-erp.operadoresarmadillo.com/comercial/api/v1';

        async function cargarSelect(url, id, valField, labelField, placeholder = '— Seleccione —') {
            try {
                const r = await fetch(url);
                if (!r.ok) return;
                const data = await r.json();
                const sel = document.getElementById(id);
                sel.innerHTML = `<option value="">${placeholder}</option>`;
                data.forEach(d => {
                    const o = document.createElement('option');
                    o.value = d[valField]; o.textContent = d[labelField];
                    sel.appendChild(o);
                });
            } catch (e) { console.error('Error cargando', id, e); }
        }

        async function inicializar() {
            await Promise.all([
                cargarSelect(`${API_BASE}/generos/`, 'generoSelect', 'id', 'nombre'),
                cargarSelect(`${API_BASE}/municipios/?limit=1500`, 'ciudadSelect', 'id', 'nombre'),
                cargarSelect(`${API_BASE}/eps/activas`, 'epsSelect', 'id', 'nombre', '— Sin EPS —'),
                cargarSelect(`${API_BASE}/alimentacion/activos`, 'alimentacionSelect', 'id', 'nombre'),
                cargarSelect(`${API_BASE}/bancos/activos`, 'BancoSelect', 'id', 'nombre'),
            ]);

            // Inicializar Select2 en el buscador de Ciudad
            $('#ciudadSelect').select2({
                placeholder: '— Seleccione Ciudad —',
                allowClear: true
            });
        }

        const MAX_MB = 20;
        function validarArchivo(file, label, accept) {
            if (!file || !file.name) return null;
            if (file.size > MAX_MB * 1024 * 1024)
                return `"${label}" supera el límite de ${MAX_MB} MB.`;
            if (accept) {
                const ext = '.' + file.name.split('.').pop().toLowerCase();
                const type = (file.type || '').toLowerCase();
                const ok = accept.some(p => {
                    p = p.toLowerCase();
                    if (p.endsWith('/*')) return type.startsWith(p.slice(0, -1));
                    if (p.startsWith('.')) return ext === p;
                    return type === p || type.startsWith(p);
                });
                if (!ok) return `"${label}" tiene un formato no permitido.`;
            }
            return null;
        }

        const DUP_MSG = 'Ya llenaste este formulario. Para modificar algún dato escribe al 3015907964.';
        const AUTH_MSG = doc => `Tu número ${doc} no pertenece a nuestra base de datos. Realiza tu entrevista en https://linktr.ee/operadoresarmadillo o escribe al 3015907964.`;

        async function precheck(doc) {
            try {
                const r = await fetch(`${API_BASE}/personal/precheck/${encodeURIComponent(doc)}`);
                if (!r.ok) throw new Error(`HTTP ${r.status}`);
                const d = await r.json();
                if (d.existe) return { ok: false, msg: DUP_MSG };
                if (!d.autorizado) return { ok: false, msg: AUTH_MSG(doc) };
                return { ok: true };
            } catch (e) {
                return { ok: false, msg: 'Error validando autorización. Intenta de nuevo.' };
            }
        }

        document.addEventListener('DOMContentLoaded', async () => {
            await inicializar();

            document.getElementById('personalForm').addEventListener('submit', async e => {
                e.preventDefault();
                const form = e.target;
                const btn = form.querySelector('.btn-submit');
                if (btn.disabled) return;
                btn.disabled = true;
                const txt = btn.textContent;
                btn.textContent = 'Enviando…';

                try {
                    if (!navigator.onLine) { alert('Sin conexión a internet.'); return; }
                    const fd = new FormData(form);

                    // Validaciones
                    const doc = (fd.get('num_documento') || '').trim();
                    if (!/^\d{6,10}$/.test(doc)) { alert('La cédula debe tener entre 6 y 10 dígitos.'); return; }

                    const fecha = new Date(fd.get('fecha_nacimiento'));
                    if (isNaN(fecha) || fecha > new Date()) { alert('Fecha de nacimiento inválida.'); return; }

                    if (!fd.get('municipios_id')) { alert('Falta seleccionar: Ciudad.'); return; }

                    const check = await precheck(doc);
                    if (!check.ok) { alert(check.msg); return; }

                    const archivos = [
                        { n: 'per_foto', l: 'Foto personal', req: true, ac: ['image/*'] },
                        { n: 'per_pdf_cedula', l: 'Imagen Cédula', req: true, ac: ['application/pdf', 'image/*'] },
                        { n: 'per_pdf_comprobante_banco', l: 'Certificado bancario', req: true, ac: ['application/pdf', 'image/*'] },
                        { n: 'per_pdf_rut', l: 'RUT', req: false, ac: ['application/pdf', 'image/*'] },
                        { n: 'per_pdf_hoja_vida', l: 'Hoja de vida', req: false, ac: ['application/pdf', 'image/*'] },
                    ];
                    for (const a of archivos) {
                        const f = fd.get(a.n);
                        if (a.req && (!f || !f.name)) { alert(`Falta adjuntar: ${a.l}.`); return; }
                        const err = validarArchivo(f && f.name ? f : null, a.l, a.ac);
                        if (err) { alert(err); return; }
                    }

                    // Limpiar opcionales vacíos
                    ['per_pdf_rut', 'per_pdf_hoja_vida', 'per_foto',
                        'segundo_nombre', 'segundo_apellido', 'telefono_llamada',
                        'talla_pantalon', 'talla_zapatos', 'alergias'].forEach(k => {
                            const v = fd.get(k);
                            if (!v || (v instanceof File && !v.name) || v === '') fd.delete(k);
                        });

                    const res = await fetch(`${API_BASE}/personal/`, { method: 'POST', body: fd });
                    if (!res.ok) {
                        let det = `HTTP ${res.status}`;
                        try { const e = await res.json(); det = e.detail || JSON.stringify(e); } catch (_) { }
                        throw new Error(det);
                    }
                    alert('✅ Registro guardado correctamente.');
                    form.reset();
                    $('#ciudadSelect').val(null).trigger('change');
                } catch (err) {
                    alert(`⚠️ No pudimos completar el registro.\n\n${err.message || err}`);
                } finally {
                    btn.disabled = false;
                    btn.textContent = txt;
                }
            });
        });

        // Solo dígitos
        (() => {
            const ctrl = new Set(['Backspace', 'Delete', 'Tab', 'Escape', 'Enter', 'ArrowLeft', 'ArrowRight', 'Home', 'End']);
            document.addEventListener('keydown', e => {
                const el = e.target;
                if (!(el instanceof HTMLInputElement) || !el.classList.contains('digits-only')) return;
                if (ctrl.has(e.key) || ((e.ctrlKey || e.metaKey) && 'acvx'.includes(e.key.toLowerCase()))) return;
                if (!/^\d$/.test(e.key) || el.value.length >= (parseInt(el.maxLength) || 9999)) e.preventDefault();
            });
            document.addEventListener('paste', e => {
                const el = e.target;
                if (!(el instanceof HTMLInputElement) || !el.classList.contains('digits-only')) return;
                e.preventDefault();
                const digits = ((e.clipboardData || window.clipboardData).getData('text') || '').replace(/\D/g, '');
                const space = (parseInt(el.maxLength) || 9999) - el.value.length;
                if (space > 0 && digits) el.value += digits.slice(0, space);
            });
            document.addEventListener('input', e => {
                const el = e.target;
                if (!(el instanceof HTMLInputElement) || !el.classList.contains('digits-only')) return;
                const c = el.value.replace(/\D/g, '').slice(0, parseInt(el.maxLength) || 9999);
                if (el.value !== c) el.value = c;
            });
        })();

        // Solo letras
        (() => {
            const re = /[A-Za-zÁÉÍÓÚÜáéíóúüÑñ\s'-]/g;
            document.addEventListener('input', e => {
                const el = e.target;
                if (!(el instanceof HTMLInputElement) || !el.classList.contains('solo_letras')) return;
                const c = (el.value.match(re) || []).join('').slice(0, parseInt(el.maxLength) || 100);
                if (el.value !== c) el.value = c;
            });
            document.addEventListener('paste', e => {
                const el = e.target;
                if (!(el instanceof HTMLInputElement) || !el.classList.contains('solo_letras')) return;
                e.preventDefault();
                const raw = ((e.clipboardData || window.clipboardData).getData('text') || '');
                const c = (raw.match(re) || []).join('');
                const space = (parseInt(el.maxLength) || 100) - el.value.length;
                if (space > 0 && c) el.value += c.slice(0, space);
            });
        })();
    </script>
</body>
